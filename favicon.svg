<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fond avec dégradé bleu -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cercle de fond -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>
  
  <!-- Cercle horloge (contour) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Centre horloge -->
  <circle cx="32" cy="32" r="3" fill="white"/>
  
  <!-- Aiguille heure (12→2) -->
  <line x1="32" y1="32" x2="40" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Aiguille minute (12→10) -->
  <line x1="32" y1="32" x2="22" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Chiffre "2" stylisé en bas à droite (pour "Time2Crack") -->
  <text x="48" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">2</text>
</svg>
