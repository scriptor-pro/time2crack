<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout 3 : Pile de Priorités — Time2Crack</title>
  <link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
  <link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,500,600&display=swap" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e5e5;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Main container */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0;
      position: relative;
    }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Essential result card (Niveau 2) */
    .essential-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .essential-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .essential-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .essential-time {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .essential-time.danger {
      color: var(--danger);
    }

    .essential-time.warning {
      color: var(--warning);
    }

    .essential-time.success {
      color: var(--success);
    }

    .essential-description {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Contextual alert card (Niveau 3) */
    .alert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: none; /* Hidden by default, shown when needed */
    }

    .alert-card.danger {
      border-left: 4px solid var(--danger);
      background: #fef2f2;
    }

    .alert-card.warning {
      border-left: 4px solid var(--warning);
      background: #fff7ed;
    }

    .alert-icon {
      font-size: 24px;
      margin-right: 12px;
      vertical-align: middle;
    }

    .alert-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }

    .alert-title.danger {
      color: var(--danger);
    }

    .alert-title.warning {
      color: var(--warning);
    }

    .alert-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Floating action button (Niveau 4) */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 100;
    }

    .fab:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    .fab:active {
      transform: scale(0.95);
    }

    /* Action bar (Niveau 1) */
    .action-bar {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 -2px 10px -5px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    .generate-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-right: 16px;
    }

    .generate-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .password-input {
      flex: 1;
      min-width: 0;
      font-family: 'SF Mono', 'Monaco', 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      letter-spacing: 0.05em;
    }

    .password-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .password-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .eye-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: 16px;
    }

    .eye-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    /* Language selector (top of content) */
    .language-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      padding: 0 20px;
    }

    .language-btn {
      min-width: 36px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .language-btn.active {
      background: var(--accent);
      color: var(--surface);
      border-color: var(--accent);
    }

    /* Footer with Liberapay */
    .footer {
      padding: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 420px) {
      .container {
        padding: 0;
        max-width: 100%;
      }

      .content {
        padding: 16px;
      }

      .essential-card {
        padding: 20px;
      }

      .action-bar {
        height: 64px;
        padding: 0 16px;
      }

      .generate-btn,
      .eye-btn {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }

      .password-input {
        font-size: 16px;
        padding: 10px 12px;
      }

      .fab {
        bottom: 16px;
        right: 16px;
        width: 48px;
        height: 48px;
        font-size: 18px;
      }

      .language-selector {
        margin-bottom: 16px;
        padding: 0 16px;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .content > * {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .content > *:nth-child(1) { animation-delay: 0.1s; }
    .content > *:nth-child(2) { animation-delay: 0.2s; }
    .content > *:nth-child(3) { animation-delay: 0.3s; }
    .content > *:nth-child(4) { animation-delay: 0.4s; }

    .action-bar {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s backwards;
    }

    .fab {
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.6s backwards;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="language-selector">
        <button class="language-btn active" data-lang="fr">FR</button>
        <button class="language-btn" data-lang="en">EN</button>
        <button class="language-btn" data-lang="es">ES</button>
        <button class="language-btn" data-lang="de">DE</button>
      </div>

      <!-- Essential result card (Niveau 2) -->
      <div class="essential-card" id="essential-card">
        <div class="essential-label">Temps de craquage le plus rapide</div>
        <div class="essential-time" id="essential-time">—</div>
        <div class="essential-description" id="essential-description">
          Commencez à taper votre mot de passe pour voir l'analyse
        </div>
      </div>

      <!-- Contextual alert card (Niveau 3) - hidden by default -->
      <div class="alert-card" id="alert-card">
        <div class="alert-title">
          <span class="alert-icon" id="alert-icon">⚠️</span>
          <span id="alert-title-text">Mot de passe compromis</span>
        </div>
        <div class="alert-text" id="alert-text">
          Ce mot de passe apparaît dans des fuites de données connues.
          Il est fortement recommandé de le changer immédiatement.
        </div>
      </div>
    </div>

    <!-- Action bar (Niveau 1) -->
    <div class="action-bar">
      <button class="generate-btn" id="generate-btn" title="Générer un mot de passe">🔑</button>
      <input 
        type="password" 
        class="password-input" 
        id="password-input" 
        placeholder="Entrez votre mot de passe"
        autocomplete="off"
      />
      <button class="eye-btn" id="eye-btn" title="Afficher/Masquer">👁️</button>
    </div>

    <!-- Floating action button (Niveau 4) -->
    <button class="fab" id="fab" title="Voir les détails">📊</button>

    <!-- Footer -->
    <div class="footer">
      <p>Calcul 100% local • Aucune donnée transmise</p>
      <div>
        <script src="https://liberapay.com/BaudouinVH/widgets/button.js"></script>
        <noscript><a href="https://liberapay.com/BaudouinVH/donate"><img alt="Donate using Liberapay" src="https://liberapay.com/assets/widgets/donate.svg"></a></noscript>
      </div>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password-input');
    const essentialTime = document.getElementById('essential-time');
    const essentialDescription = document.getElementById('essential-description');
    const alertCard = document.getElementById('alert-card');
    const alertIcon = document.getElementById('alert-icon');
    const alertTitleText = document.getElementById('alert-title-text');
    const alertText = document.getElementById('alert-text');
    const generateBtn = document.getElementById('generate-btn');
    const eyeBtn = document.getElementById('eye-btn');
    const fab = document.getElementById('fab');
    const languageBtns = document.querySelectorAll('.language-btn');

    // State
    let isPasswordVisible = false;
    let currentPassword = '';

    // Initialize
    updateUI('');

    // Event listeners
    passwordInput.addEventListener('input', handlePasswordInput);
    generateBtn.addEventListener('click', generatePassword);
    eyeBtn.addEventListener('click', togglePasswordVisibility);
    fab.addEventListener('click', showDetails);
    
    languageBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        languageBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // In real app, would change language here
      });
    });

    function handlePasswordInput(e) {
      currentPassword = e.target.value;
      updateUI(currentPassword);
    }

    function updateUI(password) {
      // Update essential result
      const analysis = analyzePassword(password);
      
      essentialTime.textContent = analysis.time;
      essentialTime.className = 'essential-time';
      if (analysis.danger) essentialTime.classList.add('danger');
      else if (analysis.warning) essentialTime.classList.add('warning');
      else essentialTime.classList.add('success');
      
      essentialDescription.textContent = analysis.description;
      
      // Show/hide alert card based on password strength
      if (password.length >= 4) {
        if (analysis.showAlert) {
          alertCard.style.display = 'block';
          alertIcon.textContent = analysis.alertIcon;
          alertTitleText.textContent = analysis.alertTitle;
          alertTitleText.className = '';
          if (analysis.alertType === 'danger') {
            alertTitleText.classList.add('danger');
            alertCard.className = 'alert-card alert-card danger';
          } else if (analysis.alertType === 'warning') {
            alertTitleText.classList.add('warning');
            alertCard.className = 'alert-card alert-card warning';
          }
          alertText.textContent = analysis.alertText;
        } else {
          alertCard.style.display = 'none';
        }
      } else {
        alertCard.style.display = 'none';
      }
    }

    function analyzePassword(password) {
      if (!password || password.length < 4) {
        return {
          time: '—',
          description: 'Entrez au moins 4 caractères pour voir l\'analyse',
          danger: false,
          warning: false,
          showAlert: false
        };
      }

      // Simplified entropy calculation
      let charsetSize = 0;
      const hasLower = /[a-z]/.test(password);
      const hasUpper = /[A-Z]/.test(password);
      const hasDigit = /[0-9]/.test(password);
      const hasSpecial = /[^A-Za-z0-9]/.test(password);

      if (hasLower) charsetSize += 26;
      if (hasUpper) charsetSize += 26;
      if (hasDigit) charsetSize += 10;
      if (hasSpecial) charsetSize += 32; // approximate special chars

      if (charsetSize === 0) charsetSize = 26; // fallback to lowercase only

      const entropy = password.length * Math.log2(charsetSize);
      
      // Time estimation (simplified)
      let time, description, danger = false, warning = false, showAlert = false;
      let alertType = null, alertIcon = '', alertTitle = '', alertText = '';

      if (entropy < 28) {
        time = '< 1 seconde';
        description = 'Très vulnérable - changez immédiatement';
        danger = true;
        showAlert = true;
        alertType = 'danger';
        alertIcon = '🚨';
        alertTitle = 'Mot de passe très faible';
        alertText = 'Ce mot de passe peut être cracked en moins d\'une seconde avec une attaque basique.';
      } else if (entropy < 36) {
        time = '1-60 secondes';
        description = 'Vulnérable - utilisez un mot de passe plus fort';
        danger = true;
        showAlert = true;
        alertType = 'danger';
        alertIcon = '⚠️';
        alertTitle = 'Mot de passe faible';
        alertText = 'Ce mot de passe peut être cracked en moins d\'une minute.';
      } else if (entropy < 50) {
        time = '1-60 minutes';
        description = 'Modérément sécurisé - améliorable';
        warning = true;
        showAlert = true;
        alertType = 'warning';
        alertIcon = '🔶';
        alertTitle = 'Sécurité modérée';
        alertText = 'Ce mot de passe offre une protection basique mais pourrait être amélioré.';
      } else if (entropy < 64) {
        time = '1-24 heures';
        description = 'Bon niveau de sécurité';
        danger = false;
        warning = false;
        showAlert = false;
      } else {
        time = '> 24 heures';
        description = 'Excellent niveau de sécurité';
        danger = false;
        warning = false;
        showAlert = false;
      }

      // Add breach check simulation (always show for demo if password is common)
      const commonPasswords = ['password', '123456', 'qwerty', 'letmein', 'monkey', 'dragon', 'baseball', 'iloveyou'];
      if (commonPasswords.includes(password.toLowerCase())) {
        showAlert = true;
        alertType = 'danger';
        alertIcon = '🚨';
        alertTitle = 'Mot de passe compromis';
        alertText = 'Ce mot de passe est extrêmement courant et apparaît dans de nombreuses fuites de données.';
        // Override time if this is worse
        if (entropy < 50) {
          time = 'Instantané';
          description = 'Critique - mot de passe extrêmement courant';
          danger = true;
        }
      }

      return {
        time,
        description,
        danger,
        warning,
        showAlert,
        alertType,
        alertIcon,
        alertTitle,
        alertText
      };
    }

    function generatePassword() {
      // Generate a secure password
      const charset = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
      const length = 16;
      let password = '';
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * charset.length);
        password += charset.charAt(randomIndex);
      }
      passwordInput.value = password;
      handlePasswordInput({ target: { value: password } });
    }

    function togglePasswordVisibility() {
      isPasswordVisible = !isPasswordVisible;
      passwordInput.type = isPasswordVisible ? 'text' : 'password';
      eyeBtn.textContent = isPasswordVisible ? '🙈' : '👁️';
    }

    function showDetails() {
      // In a real app, this would navigate to a detailed view or show a modal
      alert('Affichage des détails d\'analyse...\n\nDans une version complète, cela ouvrirait un tableau complet avec :\n- Temps par type d\'attaque\n- Temps par algorithme de hachage\n- Recommandations personnalisées\n- Historique d\'analyse');
    }

    // Initialize with empty state
    updateUI('');
  </script>
</body>
</html>
